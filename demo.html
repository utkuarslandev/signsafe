<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignSafe Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
        background:
          radial-gradient(circle at top right, rgba(94, 124, 255, 0.16), transparent 24%),
          linear-gradient(180deg, #f4f7fb, #eef2f9);
        color: #132033;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
      }

      p {
        margin-top: 0;
        max-width: 760px;
        color: #536173;
        line-height: 1.6;
      }

      #grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        margin-top: 24px;
      }

      .card {
        padding: 20px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(19, 32, 51, 0.08);
        box-shadow: 0 12px 34px rgba(19, 32, 51, 0.1);
      }

      .badge {
        display: inline-block;
        margin-bottom: 10px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: #e8eefb;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .card p {
        margin-bottom: 16px;
      }

      .card button {
        min-height: 42px;
        padding: 0 14px;
        border: none;
        border-radius: 12px;
        background: #215df6;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      #overlay-frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
        display: none;
        z-index: 99999;
      }

      #status {
        margin-top: 18px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>SignSafe Demo Fixtures</h1>
    <p>
      Use this page to preview the extension overlay without a live wallet flow. Each fixture matches the
      hackathon pitch story and uses the same UI that appears before wallet approval.
    </p>
    <div id="grid"></div>
    <div id="status"></div>
    <iframe id="overlay-frame" src="overlay.html" title="SignSafe demo overlay"></iframe>
    <script src="demo_transactions.js"></script>
    <script src="demo.js"></script>
  </body>
</html>
