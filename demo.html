<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignSafe Demo</title>
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/theme.css" />
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(ellipse 60% 40% at 80% 5%, rgba(239,58,58,0.04), transparent),
          var(--bg);
        color: var(--text);
        font-family: "Geist", "Inter", sans-serif;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        padding: 48px 40px 0;
        max-width: 920px;
        margin: 0 auto;
      }

      .wordmark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        text-decoration: none;
      }

      .wordmark img {
        width: 28px;
        height: 28px;
        display: block;
        border-radius: 6px;
      }

      .wordmark-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      header h1 {
        margin: 0 0 10px;
        font-family: "DM Serif Display", serif;
        font-size: clamp(36px, 4vw, 52px);
        font-weight: 400;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: var(--text);
      }

      header h1 em {
        font-style: italic;
        color: var(--red);
      }

      header p {
        margin: 0;
        max-width: 540px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
        font-weight: 300;
      }

      /* ── Eyebrow divider ── */
      .section-divider {
        display: flex;
        align-items: center;
        gap: 14px;
        max-width: 920px;
        margin: 36px auto 0;
        padding: 0 40px;
      }

      .section-divider span {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--red);
        white-space: nowrap;
      }

      .section-divider::before,
      .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
        opacity: 0.5;
      }

      /* ── Grid ── */
      #grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        padding: 16px 40px 0;
        max-width: 920px;
        margin: 0 auto;
      }

      /* ── Cards ── */
      .card {
        padding: 20px 20px 20px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 2px solid var(--border);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, border-top-color 160ms ease;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      }

      .card.safe   { border-top-color: var(--green); }
      .card.review { border-top-color: var(--amber); }
      .card.danger { border-top-color: var(--red); }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .type-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 6px;
      }

      .played-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 999px;
        letter-spacing: 0.04em;
      }

      .played-badge.hidden { display: none; }
      .played-badge.approved { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
      .played-badge.blocked  { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        border: 1px solid transparent;
      }

      .badge.safe   { background: var(--green-dim); color: var(--green); border-color: var(--green-border); }
      .badge.review { background: var(--amber-dim); color: var(--amber); border-color: var(--amber-border); }
      .badge.danger { background: var(--red-dim);   color: var(--red);   border-color: var(--red-border); }

      .card h2 {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.015em;
        color: var(--text);
        line-height: 1.3;
      }

      .card p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      /* Ghost trigger — sits at card bottom, no emphasis */
      .card-trigger {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border: 1px solid var(--border-2);
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: border-color 140ms ease, color 140ms ease, background 140ms ease;
        pointer-events: none; /* card itself is clickable */
      }

      .card:hover .card-trigger {
        border-color: var(--muted-2);
        color: var(--text);
      }

      .card-trigger svg {
        width: 11px;
        height: 11px;
        fill: currentColor;
        flex-shrink: 0;
      }

      /* ── Result banner ── */
      #result-banner {
        display: none;
        align-items: center;
        gap: 10px;
        max-width: 920px;
        margin: 20px 40px 0;
        padding: 13px 18px;
        border-radius: 12px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        animation: slideDown 220ms cubic-bezier(0.16,1,0.3,1);
        border: 1px solid transparent;
      }

      #result-banner.approved {
        display: flex;
        background: var(--green-dim);
        color: var(--green);
        border-color: var(--green-border);
      }

      #result-banner.blocked {
        display: flex;
        background: var(--red-dim);
        color: var(--red);
        border-color: var(--red-border);
      }

      #result-banner svg { width: 16px; height: 16px; flex-shrink: 0; }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Overlay iframe ── */
      #overlay-frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
        display: none;
        z-index: 99999;
      }

      /* ── Footer ── */
      footer {
        padding: 28px 40px;
        max-width: 920px;
        margin: 40px auto 0;
        color: var(--muted-2);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        border-top: 1px solid var(--border);
      }

      @media (max-width: 600px) {
        header, #grid, #result-banner, footer { padding-left: 20px; padding-right: 20px; }
        header { padding-top: 32px; }
        header h1 { font-size: 28px; }
        .section-divider { padding: 0 20px; }
      }

      :focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
    </style>
  </head>
  <body>
    <header>
      <div class="wordmark">
        <img src="icons/icon.svg" alt="" aria-hidden="true" />
        <span class="wordmark-text">SignSafe</span>
      </div>
      <h1>Know what you're signing<br><em>before you sign it.</em></h1>
      <p>Preview the overlay shown before any Solana wallet signing request. Click a scenario to see the live analysis UI.</p>
    </header>

    <div class="section-divider"><span>Scenarios</span></div>
    <div id="grid"></div>
    <div id="result-banner"></div>

    <footer>🔒 AI analysis helps spot risk, but it is not a guarantee. Only sign what you understand.</footer>

    <iframe id="overlay-frame" src="overlay.html" title="SignSafe overlay preview"></iframe>
    <script src="shared/constants.js"></script>
    <script src="shared/demo-fixtures.js"></script>
    <script src="src/demo/demo.js"></script>
  </body>
</html>
